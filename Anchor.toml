[toolchain]

[features]
resolution = true
skip-lint = false

[programs.localnet]
solana_yield_vibe = "CrCv1oVV3Ft2S2G1WjtjAyyXwG41YGMvFbYxeLmQ8yx6"

[registry]
url = "https://api.apr.dev"

